<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIN kód generáló</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        #codeDisplay { margin-top: 20px; font-size: 1.2em; color: #333; }
        #codeList { margin-top: 20px; }
        .codeItem { margin-bottom: 10px; }
        .active { color: green; }
        .inactive { color: red; }
    </style>
</head>
<body>
    <h1>PIN kód generáló</h1>

    <!-- Jelszó mező -->
    <div id="login">
        <label for="password">Adj meg egy jelszót:</label>
        <input type="password" id="password">
        <button id="loginBtn">Belépés</button>
        <p id="errorMsg" style="color: red;"></p>
    </div>

    <!-- Kódok megjelenítése, csak belépés után -->
    <div id="codeSection" style="display: none;">
        <button id="generateBtn">Generálj két kódot</button>
        <div id="codeDisplay"></div>
        <div id="codeList"></div>
    </div>

    <script>
        // A belépési jelszó
        const correctPassword = '19890221';

        // Kódok tárolása tömbben
        let codes = [];

        document.getElementById('loginBtn').addEventListener('click', function() {
            const userPassword = document.getElementById('password').value;
            if (userPassword === correctPassword) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('codeSection').style.display = 'block';
            } else {
                document.getElementById('errorMsg').innerText = 'Hibás jelszó!';
            }
        });

        function generateCodes() {
            let code1 = '';
            let code2 = '';
            for (let i = 0; i < 6; i++) {
                code1 += Math.floor(Math.random() * 10);
                code2 += Math.floor(Math.random() * 10);
            }

            const now = new Date();
            const timestamp = now.toLocaleString();

            codes.push({ code: code1, status: 'active', time: timestamp });
            codes.push({ code: code2, status: 'active', time: timestamp });

            updateCodeDisplay();
        }

        function updateCodeDisplay() {
            // Aktuális kódok megjelenítése
            let codeDisplay = document.getElementById('codeDisplay');
            codeDisplay.innerHTML = '';

            codes.forEach((item, index) => {
                codeDisplay.innerHTML += `<div class="codeItem">Kód ${index + 1}: ${item.code} - Státusz: <span class="${item.status === 'active' ? 'active' : 'inactive'}">${item.status}</span> (idő: ${item.time})</div>`;
            });
        }

        document.getElementById('generateBtn').addEventListener('click', generateCodes);
    </script>
</body>
</html>
